<label class="form-label small text-muted">
    Filtrar por bairro
</label>

<select 
    name="bairro"
    id="bairro"
    class="form-select"
    {% if not request.GET.cidade %}disabled{% endif %}
>
    <option value="">Selecione um bairro</option>

    {% for b in lista_bairros %}
        <option value="{{ b }}" 
            {% if request.GET.bairro == b %}selected{% endif %}
        >
            {{ b }}
        </option>
    {% endfor %}
</select>
